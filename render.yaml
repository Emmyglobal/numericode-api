services:
  - type: web
    name: numericode-api
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: DATABASE_URL
        fromDatabase:
          name: numericode-db
          property: connectionString
      - key: CLIENT_URL
        sync: false

databases:
  - name: numericode-db
    plan: free
    databaseName: numericode
    user: numericode
