# Local full-stack development environment.
# Spins up Postgres + the API together. Run: docker compose up
#
# The frontend is not included here — run it separately with `npm run dev`
# in the numericode/ project, pointing VITE_API_BASE_URL at http://localhost:3001/api

version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: numericode
    ports:
      - '5432:5432'
    volumes:
      - numericode_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: development
      PORT: 3001
      DATABASE_URL: postgresql://postgres:password@postgres:5432/numericode
      JWT_SECRET: dev-secret-change-me
      JWT_EXPIRES_IN: 7d
      CLIENT_URL: http://localhost:5173
    ports:
      - '3001:3001'

volumes:
  numericode_pgdata:
